<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>404 — Page not found · LinkLabs</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: 'Barlow', system-ui, -apple-system, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      display: flex; flex-direction: column;
    }
    .bg-grain {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4;
      background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03) 0%, transparent 50%);
    }
    .compass {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.6;
    }
    .compass svg { width: 280px; height: 280px; animation: compassSpin 60s linear infinite; }
    @keyframes compassSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .compass svg { animation: none; } }
    @media (max-width: 640px) { .compass svg { width: 200px; height: 200px; } }
    .navbar {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 32px;
      max-width: 1200px; margin: 0 auto; width: 100%;
    }
    @media (max-width: 640px) { .navbar { padding: 18px 20px; } }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; }
    .logo svg { width: 28px; height: 28px; }
    .logo-text { font-family: 'Instrument Serif', Georgia, serif; font-size: 22px; letter-spacing: -0.5px; }
    .home-link {
      font-size: 13px; font-weight: 500; letter-spacing: 0.05em;
      color: rgba(255,255,255,0.7); text-decoration: none;
      padding: 8px 16px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      transition: all 0.2s ease;
    }
    .home-link:hover { color: #fff; border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.04); }

    main {
      flex: 1;
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 60px 24px 80px;
    }
    .content { max-width: 640px; width: 100%; text-align: center; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 28px;
      animation: fadeUp 0.7s cubic-bezier(0.19, 1, 0.22, 1) 0.1s both;
    }
    .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #f87171; box-shadow: 0 0 8px rgba(248,113,113,0.6); }
    .big {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: clamp(140px, 28vw, 240px);
      line-height: 0.85;
      letter-spacing: -10px;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.5) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      animation: fadeUp 0.9s cubic-bezier(0.19, 1, 0.22, 1) 0.2s both;
    }
    .title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.05;
      letter-spacing: -1.5px;
      margin: 8px 0 18px;
      animation: fadeUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) 0.35s both;
    }
    .desc {
      font-size: 16px; line-height: 1.6;
      color: rgba(255,255,255,0.65);
      max-width: 44ch; margin: 0 auto 32px;
      animation: fadeUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) 0.45s both;
    }
    .actions {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      animation: fadeUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) 0.55s both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 22px; border-radius: 14px;
      font-size: 14px; font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .btn-primary { background: #fff; color: #000; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 14px 30px -10px rgba(255,255,255,0.3); }
    .btn-secondary { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.85); border: 1px solid rgba(255,255,255,0.12); }
    .btn-secondary:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .btn svg { width: 14px; height: 14px; transition: transform 0.2s ease; }
    .btn:hover svg { transform: translate(2px, -2px); }

    .links {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      animation: fadeUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) 0.7s both;
    }
    .links a {
      padding: 8px 16px; border-radius: 999px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
      transition: all 0.2s ease;
    }
    .links a:hover { background: rgba(255,255,255,0.07); color: #fff; border-color: rgba(255,255,255,0.20); }

    footer {
      position: relative; z-index: 1;
      text-align: center; padding: 20px;
      font-size: 11px; color: rgba(255,255,255,0.4);
      letter-spacing: 0.05em;
    }
    footer a { color: rgba(255,255,255,0.6); text-decoration: none; }
    footer a:hover { color: #fff; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="bg-grain"></div>

      <line x1="100" y1="170" x2="100" y2="190" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="100" x2="30" y2="100" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-linecap="round"/>
      <line x1="170" y1="100" x2="190" y2="100" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-linecap="round"/>
      <polygon points="100,10 105,20 95,20" fill="rgba(255,255,255,0.06)"/>
      <polygon points="100,190 105,180 95,180" fill="rgba(255,255,255,0.06)"/>
      <polygon points="10,100 20,105 20,95" fill="rgba(255,255,255,0.06)"/>

      <text x="100" y="105" text-anchor="middle" font-family="Instrument Serif, Georgia, serif" font-size="14" font-style="italic" fill="rgba(255,255,255,0.04)" letter-spacing="2">L</text>
      <text x="100" y="118" text-anchor="middle" font-family="Instrument Serif, Georgia, serif" font-size="14" font-style="italic" fill="rgba(255,255,255,0.04)" letter-spacing="2">L</text>
    </svg>
  </div>

  <nav class="navbar">
    <a class="logo" href="/">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="22" y1="18" x2="22" y2="82" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
        <line x1="22" y1="82" x2="78" y2="82" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
        <circle cx="22" cy="18" r="10" fill="#fff"/>
        <circle cx="22" cy="82" r="10" fill="#fff"/>
        <circle cx="78" cy="82" r="10" fill="#fff"/>
        <circle cx="22" cy="50" r="3.5" fill="#fff" opacity="0.55"/>
      </svg>
      <span class="logo-text">LinkLabs</span>

    <a class="home-link" href="/">Back to home</a>
  </nav>

  <main>
    <div class="content">
      <div class="badge"><span class="dot"></span>Error 404</div>
      <h1 class="big">404</h1>

      <div class="actions">

      <div class="links">
