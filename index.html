  <style>
    html { scroll-behavior: smooth; }
    :root {
      --bg: #000000; --fg: #ffffff; --muted: rgba(255,255,255,0.6);
      --card: rgba(255,255,255,0.02); --border: rgba(255,255,255,0.08);
      --accent: #10b981; --accent-glow: rgba(16,185,129,0.4);
      --glass: rgba(255,255,255,0.04); --glass-strong: rgba(255,255,255,0.08);
    }
    body {
      background: var(--bg); color: var(--fg); margin: 0;
      font-family: 'Barlow', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: rgba(255,255,255,0.18); color: #fff; }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: ""; position: absolute; inset: 0;
      border-radius: inherit; padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,    rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }
    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative; overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: ""; position: absolute; inset: 0;
      border-radius: inherit; padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,  rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,   rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    #boot-loader {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: #000; color: #fff;
      font-family: 'Instrument Serif', serif; font-style: italic;
      font-size: 1.25rem; z-index: 9999;
      gap: 0.75rem;
    }
    #boot-loader svg { animation: float 4s ease-in-out infinite; }

    #scroll-progress {
      position: fixed; top: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0.95));
      box-shadow: 0 0 8px rgba(255,255,255,0.4);
      z-index: 9997; width: 0%;
      transition: width 0.05s linear;
    }
    #scroll-dots {
      position: fixed; right: 24px; top: 50%; transform: translateY(-50%);
      z-index: 9996; display: flex; flex-direction: column; gap: 12px;
    }
    .scroll-dot-btn {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3);
      cursor: pointer; transition: all 0.2s ease;
      position: relative;
    }
    .scroll-dot-btn::after {
      content: attr(data-label);
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
      white-space: nowrap; font-size: 11px; color: var(--fg);
      opacity: 0; visibility: hidden; transition: all 0.2s ease;
      padding: 4px 8px; background: var(--glass); border: 1px solid var(--border);
      border-radius: 6px; font-family: 'Barlow', sans-serif; font-size: 11px;
    }
    .scroll-dot-btn:hover::after { opacity: 1; visibility: visible; right: 14px; }
    .scroll-dot-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
    .scroll-dot-btn.active::after { opacity: 1; visibility: visible; right: 14px; }
    #particle-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      will-change: transform;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float-anim { animation: float 4s ease-in-out infinite; }

    @keyframes logoNodePulse {
      0%, 100% { transform: scale(1); opacity: 0.55; }
      50% { transform: scale(1.4); opacity: 1; }
    }
    .logo-node { animation: logoNodePulse 2.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }

    @keyframes logoDraw {
      0% { stroke-dashoffset: 200; opacity: 0; }
      20% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 1; }
    }
    .logo-stroke { stroke-dasharray: 200; stroke-dashoffset: 200; animation: logoDraw 1.1s cubic-bezier(0.65, 0, 0.35, 1) 0.15s forwards; }
    .logo-stroke-late { animation-delay: 0.35s; }

    @keyframes logoNodeIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .logo-end-node { animation: logoNodeIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; transform-origin: center; transform-box: fill-box; opacity: 0; }
    .logo-end-node-1 { animation-delay: 0.5s; }
    .logo-end-node-2 { animation-delay: 0.95s; }
    .logo-end-node-3 { animation-delay: 1.4s; }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }

    @keyframes blurReveal {
      0% { filter: blur(10px); opacity: 0; transform: translateY(50px); }
      50% { filter: blur(5px); opacity: 0.5; transform: translateY(-5px); }
      100% { filter: blur(0px); opacity: 1; transform: translateY(0); }
    }
    .word-blur { display: inline-block; margin-right: 0.28em; opacity: 0; }
    .word-blur.visible { animation: blurReveal 0.7s ease-out forwards; }

    @keyframes fadeSlideUp {
      0% { filter: blur(10px); opacity: 0; transform: translateY(20px); }
      50% { filter: blur(5px); opacity: 0.5; transform: translateY(-5px); }
      100% { filter: blur(0px); opacity: 1; transform: translateY(0); }
    }
    .fade-el { opacity: 0; }
    .fade-el.visible { animation: fadeSlideUp 0.8s ease-out forwards; }

    .reveal-el { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
    .reveal-el.visible { opacity: 1; transform: translateY(0); }

    .overlay-enter { opacity: 0; }
    .overlay-enter-active { opacity: 1; transition: opacity 0.3s ease-out; }
    .overlay-exit { opacity: 1; }
    .overlay-exit-active { opacity: 0; transition: opacity 0.3s ease-out; }

    .nav-pill {
      position: absolute; top: 4px; bottom: 4px; left: 0;
      background: #fff; border-radius: 9999px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.12);
      transition: transform 0.55s cubic-bezier(0.32, 0.72, 0, 1), width 0.45s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.25s ease-out;
      pointer-events: none; z-index: 0;
    }

    nav[data-nav] {
      transition: padding 0.3s ease;
    }
    nav[data-nav].nav-scrolled { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    nav[data-nav].nav-scrolled [data-nav-shell] {
      background: rgba(15,15,15,0.55);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    [data-nav-shell] {
      transition: background 0.4s ease, backdrop-filter 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    section[data-hero] {
      --py: 0px; --ps: 1; --po: 1;
    }
    section[data-hero] [data-hero-bg] {
      transform: translate3d(0, var(--py), 0) scale(var(--ps));
      opacity: var(--po);
      will-change: transform, opacity;
    }
    section[data-hero] [data-hero-fg] {
      transform: translate3d(0, calc(var(--py) * 0.4), 0);
      will-change: transform;
    }

    [data-spotlight] {
      position: relative;
      isolation: isolate;
    }
    [data-spotlight]::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(320px circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.08), transparent 50%);
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: screen;
    }
    [data-spotlight]:hover::after { opacity: 1; }

    [data-magnetic] {
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
      transform: translate3d(var(--tx, 0), var(--ty, 0), 0);
      will-change: transform;
    }

    .marquee {
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
    }
    .marquee-track {
      display: flex; gap: 3rem; width: max-content;
      animation: marquee 40s linear infinite;
    }
    .marquee:hover .marquee-track { animation-play-state: paused; }
    @keyframes marquee {
      from { transform: translate3d(0,0,0); }
      to { transform: translate3d(-50%,0,0); }
    }

    @keyframes scrollDot {
      0% { transform: translateY(0); opacity: 1; }
      60% { transform: translateY(8px); opacity: 0; }
      100% { transform: translateY(0); opacity: 0; }
    }
    .scroll-dot { animation: scrollDot 1.8s cubic-bezier(0.65, 0, 0.35, 1) infinite; }

    .reveal-mask {
      display: inline-block; overflow: hidden; vertical-align: bottom;
    }
    .reveal-mask > span {
      display: inline-block;
      transform: translateY(110%);
      transition: transform 0.9s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .reveal-mask.in > span { transform: translateY(0); }

    .split-char { display: inline-block; transform: translateY(40%); opacity: 0; transition: transform 0.7s cubic-bezier(0.19,1,0.22,1), opacity 0.7s ease; }
    .split-char.in { transform: translateY(0); opacity: 1; }

    #back-to-top {
      position: fixed; right: 1.5rem; bottom: 1.5rem; z-index: 50;
      width: 44px; height: 44px; border-radius: 9999px;
      background: rgba(20,20,20,0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(20px) scale(0.9);
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.2,0.8,0.2,1), background 0.2s ease;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    #back-to-top.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    #back-to-top:hover { background: rgba(40,40,40,0.9); }
    #back-to-top:active { transform: scale(0.92); }

    .tilt-card {
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.2,0.8,0.2,1);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      [data-magnetic] { transform: none !important; }
      section[data-hero] [data-hero-bg] { transform: none !important; opacity: 1 !important; }
      .petal-field .petal { animation: none !important; opacity: 0.15 !important; }
    }

    /* === Flower petal background (replaces laggy video) === */
    .petal-field { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .petal-field .petal {
      position: absolute;
      width: 70px; height: 70px;
      background: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.85), rgba(255,170,200,0.45) 35%, rgba(180,120,200,0.2) 60%, transparent 75%);
      border-radius: 50% 0 50% 50%;
      filter: blur(3px);
      mix-blend-mode: screen;
      opacity: 0;
      will-change: transform, opacity;
      animation: petalFloat 14s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes petalFloat {
      0%   { transform: translate3d(0, 0, 0) rotate(0deg) scale(0.6); opacity: 0; }
      10%  { opacity: 0.55; }
      25%  { transform: translate3d(40px, -60px, 0) rotate(90deg) scale(1.05); opacity: 0.65; }
      50%  { transform: translate3d(-25px, -130px, 0) rotate(200deg) scale(0.95); opacity: 0.45; }
      75%  { transform: translate3d(-55px, -70px, 0) rotate(300deg) scale(1.1); opacity: 0.55; }
      90%  { opacity: 0.4; }
      100% { transform: translate3d(0, 0, 0) rotate(360deg) scale(0.6); opacity: 0; }
    }

    @keyframes bootFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
    #boot-loader.fade-out { animation: bootFadeOut 0.6s ease forwards; }

    @keyframes appReveal {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    #root > * { animation: appReveal 0.8s cubic-bezier(0.19, 1, 0.22, 1) 0.1s both; }

    a, button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    /* === Premium form styles === */
    .form-field {
      position: relative;
      display: block;
      width: 100%;
    }
    .form-field .form-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35);
      pointer-events: none;
      transition: color 0.25s ease, transform 0.25s ease;
    }
    .form-field.textarea .form-icon { top: 22px; transform: none; }
    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      color: #fff;
      font-family: 'Barlow', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 300;
      padding: 16px 18px 16px 48px;
      outline: none;
      transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease, transform 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-field.no-icon input,
    .form-field.no-icon select { padding-left: 18px; }
    .form-field textarea { padding-left: 48px; min-height: 130px; resize: vertical; line-height: 1.55; }
    .form-field select {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.5)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 18px 18px;
      padding-right: 44px;
    }
    .form-field select option { background: #0a0a0a; color: #fff; }
    .form-field input::placeholder,
    .form-field textarea::placeholder { color: rgba(255,255,255,0.35); }
    .form-field input:hover,
    .form-field select:hover,
    .form-field textarea:hover { border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.055); }
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      border-color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.06);
    }
    .form-field:focus-within .form-icon { color: rgba(255,255,255,0.85); transform: translateY(-50%) scale(1.08); }
    .form-field.textarea:focus-within .form-icon { transform: scale(1.08); }
    .form-field input[aria-invalid="true"],
    .form-field select[aria-invalid="true"],
    .form-field textarea[aria-invalid="true"] {
      border-color: rgba(248,113,113,0.55);
      box-shadow: 0 0 0 4px rgba(248,113,113,0.08);
    }
    @keyframes fieldShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .form-field.shake input,
    .form-field.shake select,
    .form-field.shake textarea { animation: fieldShake 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;

  <script>
    (function() {
      var canvas = document.getElementById('particle-canvas');
      if (!canvas) return;
      var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) { canvas.style.display = 'none'; return; }
      var ctx = canvas.getContext('2d');
      var particles = [];
      var mouse = { x: -1000, y: -1000 };
      var W, H;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      document.addEventListener('mousemove', function(e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      var isVisible = true;
      var animId = null;
      var count = window.innerWidth < 768 ? 14 : 22;
      for (var i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.2,
          vy: (Math.random() - 0.5) * 0.2,
          r: Math.random() * 1.2 + 0.5,
          o: Math.random() * 0.3 + 0.1
        });
      }

      function animate() {
        if (!isVisible) { animId = null; return; }
        ctx.clearRect(0, 0, W, H);
        var len = particles.length;
        for (var i = 0; i < len; i++) {
          var p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = W;
          if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H;
          if (p.y > H) p.y = 0;

          var dx = mouse.x - p.x;
          var dy = mouse.y - p.y;
          var distSq = dx * dx + dy * dy;
          if (distSq < 22500) {
            p.x -= dx * 0.005;
            p.y -= dy * 0.005;
          }

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,' + p.o + ')';
          ctx.fill();

          for (var j = i + 1; j < len; j++) {
            var p2 = particles[j];
            var dx2 = p.x - p2.x;
            var dy2 = p.y - p2.y;
            var d2 = dx2 * dx2 + dy2 * dy2;
            if (d2 < 14400) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = 'rgba(255,255,255,' + (0.06 * (1 - Math.sqrt(d2) / 120)) + ')';
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        animId = requestAnimationFrame(animate);
      }
      animate();

      if ('IntersectionObserver' in window) {
        var visObs = new IntersectionObserver(function(entries) {
          for (var i = 0; i < entries.length; i++) {
            if (entries[i].isIntersecting) { isVisible = true; if (!animId) animate(); }
            else { isVisible = false; if (animId) { cancelAnimationFrame(animId); animId = null; } }
          }
        }, { threshold: 0 });
        visObs.observe(canvas);
      }
    })();
  </script>

  <script>
    /* === Confetti (used on contact-form success) === */
    window.fireConfetti = function (opts) {
      opts = opts || {};
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      if (window.__confettiRunning) return;
      window.__confettiRunning = true;
      var canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      var ctx = canvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      canvas.width *= dpr; canvas.height *= dpr;
      ctx.scale(dpr, dpr);
      var W = window.innerWidth, H = window.innerHeight;
      var colors = ['#ffffff', '#a7f3d0', '#fde68a', '#fca5a5', '#c4b5fd', '#7dd3fc', '#fbbf24'];
      var shapes = ['square', 'circle', 'tri', 'line'];
      var count = opts.count || 110;
      var parts = [];
      var startX = W / 2, startY = H * 0.35;
      for (var i = 0; i < count; i++) {
        var angle = Math.random() * Math.PI * 2;
        var speed = 6 + Math.random() * 8;
        var upBias = 0.55 + Math.random() * 0.35;
        parts.push({
          x: startX + (Math.random() - 0.5) * 80,
          y: startY + (Math.random() - 0.5) * 40,
          vx: Math.cos(angle) * speed * (0.4 + Math.random() * 0.6),
          vy: -Math.abs(Math.sin(angle) * speed * upBias) - 3,
          w: 6 + Math.random() * 8,
          h: 3 + Math.random() * 6,
          c: colors[Math.floor(Math.random() * colors.length)],
          s: shapes[Math.floor(Math.random() * shapes.length)],
          r: Math.random() * Math.PI * 2,
          rs: (Math.random() - 0.5) * 0.3,
          life: 0,
          maxLife: 120 + Math.random() * 80
        });
      }
      var start = performance.now();
      function frame(now) {
        var t = now - start;
        ctx.clearRect(0, 0, W, H);
        var alive = 0;
        for (var i = 0; i < parts.length; i++) {
          var p = parts[i];
          p.life++;
          if (p.life > p.maxLife) continue;
          alive++;
          p.vy += 0.28;
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.995;
          p.r += p.rs;
          var fade = 1 - (p.life / p.maxLife);
          ctx.save();
          ctx.globalAlpha = Math.max(0, fade);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.r);
          ctx.fillStyle = p.c;
          if (p.s === 'circle') {
            ctx.beginPath(); ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2); ctx.fill();
          } else if (p.s === 'tri') {
            ctx.beginPath(); ctx.moveTo(0, -p.w / 2); ctx.lineTo(p.w / 2, p.w / 2); ctx.lineTo(-p.w / 2, p.w / 2); ctx.closePath(); ctx.fill();
          } else if (p.s === 'line') {
            ctx.fillRect(-p.w / 2, -0.8, p.w, 1.6);
          } else {
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          }
          ctx.restore();
        }
        if (alive > 0 && t < 5000) { requestAnimationFrame(frame); }
        else { cleanup(); }
      }
      function cleanup() {
        window.__confettiRunning = false;
        if (canvas && canvas.parentNode) canvas.parentNode.removeChild(canvas);
      }
      requestAnimationFrame(frame);
    };
  </script>

  <script>
    (function() {
      var progress = document.getElementById('scroll-progress');
      var navEl = null;
      var heroEl = null;
      var btt = null;
      var ticking = false;
      var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function loop() {
        var scrollTop = window.scrollY || document.documentElement.scrollTop;
        var scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
        if (progress) progress.style.width = (scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0) + '%';

        if (navEl) {
          if (scrollTop > 24) navEl.classList.add('nav-scrolled');
          else navEl.classList.remove('nav-scrolled');
        }

        if (btt) {
          if (scrollTop > 600) btt.classList.add('visible');
          else btt.classList.remove('visible');
        }

        if (heroEl && !reduceMotion) {
          var heroH = heroEl.offsetHeight;
          if (scrollTop < heroH) {
            var p = scrollTop / heroH;
            heroEl.style.setProperty('--py', (p * 80) + 'px');
            heroEl.style.setProperty('--ps', (1 - p * 0.15));
            heroEl.style.setProperty('--po', (1 - p * 1.2));
          }
        }

        var dotsNav = document.getElementById('scroll-dots');
        if (dotsNav) {
          var scrollMid = scrollTop + window.innerHeight / 2;
          var best = null, bestDist = Infinity;
          var sections = ['home','services','work','process','pricing','faq','contact-section'];
          for (var i = 0; i < sections.length; i++) {
            var el = document.getElementById(sections[i]);
            if (!el) continue;
            var top = el.offsetTop, bottom = top + el.offsetHeight;
            var dist = Math.abs(scrollMid - (top + el.offsetHeight / 2));
            if (dist < bestDist) { bestDist = dist; best = sections[i]; }
          }
          var buttons = dotsNav.querySelectorAll('.scroll-dot-btn');
          for (var j = 0; j < buttons.length; j++) {
            var btn = buttons[j];
            var isActive = btn.getAttribute('data-label').toLowerCase() === (best === 'contact-section' ? 'contact' : best);
            btn.classList.toggle('active', isActive);
          }
        }

        ticking = false;
      }
      function onScroll() { if (!ticking) { requestAnimationFrame(loop); ticking = true; } }
      window.addEventListener('scroll', onScroll, { passive: true });

      function init() {
        navEl = document.querySelector('nav[data-nav]');
        heroEl = document.querySelector('section[data-hero]');
        btt = document.getElementById('back-to-top');
        if (btt) {
          btt.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
        }
