<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="gradient-roamie-travel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f140d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1d12;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="12" fill="url(#gradient-roamie-travel)" />
  <g transform="translate(40, 40)">
    <rect width="720" height="420" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" rx="8" />
    <g transform="translate(60, 60)">
      <rect width="200" height="32" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <text x="100" y="22" font-family="'Instrument Serif',serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">Travel Planner</text>
    </g>
    <g transform="translate(60, 120)">
      <g transform="translate(0,0)">
        <circle cx="80" cy="80" r="60" fill="rgba(239, 68, 68, 0.2)" stroke="rgba(239, 68, 68, 0.5)" stroke-width="2" />
        <text x="80" y="88" font-family="Barlow,sans-serif" font-size="24" font-weight="700" fill="#F87171" text-anchor="middle">NY</text>
      </g>
      <g transform="translate(160, 50)">
        <rect width="2" height="160" fill="rgba(255,255,255,0.2)" y="0" x="0" />
        <text x="-20" y="90" font-family="Barlow,sans-serif" font-size="11" font-weight="600" fill="#FBBF24" transform="rotate(-90,-20,90)" text-anchor="middle">4h flight</text>
      </g>
      <g transform="translate(220, 20)">
        <rect width="240" height="24" rx="4" fill="rgba(255,255,255,0.08)" />
        <rect width="180" height="24" rx="4" fill="rgba(255,255,255,0.12)" y="28" />
        <text x="120" y="16" font-family="Barlow,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">From: New York</text>
        <text x="90" y="44" font-family="Barlow,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">To: Rome</text>
      </g>
      <g transform="translate(220, 100)">
        <rect width="240" height="24" rx="4" fill="rgba(255,255,255,0.08)" />
        <text x="14" y="16" font-family="Barlow,sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.8)">Budget: $2,340</text>
      </g>
      <g transform="translate(220, 140)">
        <circle cx="12" cy="12" r="6" fill="#10B981" />
        <text x="26" y="16" font-family="Barlow,sans-serif" font-size="12" font-weight="600" fill="#6EE7B7">AI recommended</text>
      </g>
      <g transform="translate(460, 240)">
        <text x="110" y="16" font-family="Barlow,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">View itinerary →</text>
      </g>
    </g>
  </g>
</svg>